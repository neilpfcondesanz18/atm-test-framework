name: ATM Test Framework - CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'ci'
        type: choice
        options: [ci, staging]
      tags:
        description: 'Cucumber tags to run'
        required: false
        default: 'not @wip'

env:
  JAVA_VERSION: '21'
  TEST_ENV: ${{ github.event.inputs.environment || 'ci' }}

jobs:
  test:
    name: Run Automation Tests (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite: [api, integration]
      fail-fast: false

    steps:
      - name: Checkout test framework
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Checkout banking platform (SUT)
        uses: actions/checkout@v4
        with:
          repository: neilpfcondesanz18/atm-banking-platform
          token: ${{ secrets.PAT_TOKEN }}
          path: sut

      - name: Build & start Banking Platform
        run: |
          cd sut
          mvn package -DskipTests -q
          java -jar target/atm-banking-platform-*.jar \
            --server.port=8080 \
            --spring.profiles.active=default &
          echo "⏳ Waiting for API to start..."
          timeout 90 bash -c 'until curl -sf http://localhost:8080/api/v1/accounts/health; do sleep 3; done'
          echo "✅ Banking API is up"

      - name: Run ${{ matrix.suite }} tests
        env:
          API_BASE_URL: http://localhost:8080
          TEST_ENV: ci
        run: |
          mvn test -B \
            -Dtest.env=ci \
            -Dcucumber.filter.tags="@${{ matrix.suite }}" \
            -Dapi.base.url=http://localhost:8080

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.suite }}
          path: target/allure-results/
          retention-days: 30

      - name: Upload Cucumber JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-${{ matrix.suite }}
          path: target/cucumber-reports/
          retention-days: 30

  publish-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: always()
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-combined
          merge-multiple: true

      - name: Get Allure history from gh-pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy history for trend charts
        run: |
          mkdir -p allure-results-combined/history
          if [ -d gh-pages/allure-report/history ]; then
            cp -r gh-pages/allure-report/history/* allure-results-combined/history/ || true
          fi

      - name: Write environment info into results
        run: |
          cat > allure-results-combined/environment.properties << ENVEOF
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          RunID=${{ github.run_id }}
          Triggered.By=${{ github.actor }}
          API.URL=http://localhost:8080
          ENVEOF

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results-combined
          allure_report: allure-report
          allure_history: allure-history

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          destination_dir: allure-report
          keep_files: true

      - name: Post report URL to job summary
        run: |
          echo "## 📊 Test Report" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Allure Report:** https://neilpfcondesanz18.github.io/atm-test-framework/allure-report/" >> $GITHUB_STEP_SUMMARY
