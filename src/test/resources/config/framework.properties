# =============================================
# ATM Test Framework - Base Configuration
# Override via environment-specific .properties
# or ENV VARS (e.g. API_BASE_URL=http://...)
# =============================================

# API
api.base.url=http://localhost:8080
api.timeout.seconds=30

# UI
ui.browser=chrome
ui.headless=true
ui.timeout.seconds=15
ui.implicit.wait=5
ui.page.load.timeout=30

# Test data
testdata.default.account=ACC-001
testdata.default.pin=1234

# Reporting
allure.results.dir=target/allure-results
screenshots.dir=target/screenshots
